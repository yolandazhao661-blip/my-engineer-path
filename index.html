<!DOCTYPE html>
<html lang="en">
<head><style>
  body {
    background-color: #f0f2f5;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 50px;
  }
  h1 { color: #1a73e8; }
  button {
    padding: 10px 20px;
    background-color: #1a73e8;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
  button:hover { background-color: #1557b0; }
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>我的工程师之路</h1>
    <p>点击按钮获取全球智慧。</p >
    <button>点我试试</button>

    <!-- 👇 就在这里！在 </body> 之前插入这段逻辑 -->
    <script>
      async function getQuote() {
        const btn = document.querySelector('button');
        btn.innerText = "正在加载全球智慧...";
        
        try {
          // 调用全球名言 API
          const response = await fetch('https://api.quotable.io/random');
          const data = await response.json();
          
          document.querySelector('p').innerText = `"${data.content}" — ${data.author}`;
          btn.innerText = "再来一句！";
        } catch (error) {
          btn.innerText = "网络有点小脾气，重试一下？";
          console.error("报错啦：", error);
        }
      }

      // 让按钮点一下就执行上面的动作
      document.querySelector('button').onclick = getQuote;
</script>
</body>
</html>
